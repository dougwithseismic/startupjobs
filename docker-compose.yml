services:
  db:
    image: timescale/timescaledb-ha:pg18
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: startupjobs
      POSTGRES_PASSWORD: startupjobs
      POSTGRES_DB: startupjobs
    volumes:
      - pgdata:/home/postgres/pgdata/data
    shm_size: "256mb"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U startupjobs"]
      interval: 2s
      timeout: 5s
      retries: 10
    command: >
      postgres
      -c shared_preload_libraries='timescaledb'
      -c work_mem='64MB'
      -c maintenance_work_mem='512MB'
      -c max_parallel_maintenance_workers=4

volumes:
  pgdata:
